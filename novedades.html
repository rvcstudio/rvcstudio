<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novedades | RVC Studio</title>

    <!-- Google Config -->
    <meta name="google-site-verification" content="TU_CODIGO_DE_VERIFICACION_GSC" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-04WYB34N23"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-04WYB34N23');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7103017241533415" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b0b0b; font-family: 'Segoe UI', Roboto, sans-serif; color: #ffffff; }
        
        .cabecera-novedades {
            width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a1a1a; background-color: #070707;
        }
        .logo-nav img { max-height: 50px; }
        .nav-menu a { color: #ffffff; text-decoration: none; margin-left: 20px; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: color 0.3s; }
        .nav-menu a:hover { color: #ff0055; }

        .contenedor-blog { max-width: 850px; margin: 60px auto; padding: 0 20px; }
        .titulo-principal { font-size: 2.5rem; margin-bottom: 50px; text-transform: uppercase; }
        .titulo-principal span { color: #ff0055; }

        .lista-articulos { list-style: none; display: flex; flex-direction: column; gap: 20px; }
        .item-articulo { 
            background-color: #141414; border: 1px solid #222; border-radius: 12px; 
            padding: 25px; transition: transform 0.2s, border-color 0.2s;
        }
        .item-articulo:hover { border-color: #ff0055; transform: translateX(5px); }
        .item-articulo a { text-decoration: none; color: #ffffff; display: block; }
        .item-articulo h3 { font-size: 1.5rem; margin-bottom: 5px; }
        .fecha-articulo { color: #ff0055; font-size: 0.8rem; font-weight: 700; display: block; margin-bottom: 8px; }
        .resumen-articulo { color: #888; font-size: 0.95rem; }
    </style>
</head>
<body>

    <header class="cabecera-novedades">
        <div class="logo-nav">
            <a href="index.html"><img src="imagenes/rvc%20new%20logo.png" alt="Logo"></a>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="novedades.html">Novedades</a>
            <a href="tutoriales.html">Tutoriales</a>
        </nav>
    </header>

    <main class="contenedor-blog">
        <h1 class="titulo-principal">Últimas <span>Novedades</span></h1>
        <ul id="lista-novedades" class="lista-articulos"></ul>
    </main>

    <script>
        const posts = [
            {
                fecha: "12 JUNIO, 2026",
                titulo: "D MINI de Behringer: Minimoog de bolsillo",
                resumen: "Analizamos el sintetizador compacto que está dando de qué hablar.",
                url: "posts/d-mini-behringer.html"
            }
            // Agrega nuevos artículos arriba de este para que aparezcan primeros
        ];

        const lista = document.getElementById("lista-novedades");
        posts.forEach(post => {
            const li = document.createElement("li");
            li.className = "item-articulo";
            li.innerHTML = `
                <a href="${post.url}">
                    <span class="fecha-articulo">${post.fecha}</span>
                    <h3>${post.titulo}</h3>
                    <p class="resumen-articulo">${post.resumen}</p>
                </a>
            `;
            lista.appendChild(li);
        });
    </script>
</body>
</html>
