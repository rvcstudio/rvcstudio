    <style>
        /* --- ESTILOS GENERALES Y RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; line-height: 1.6; }
        
        /* --- ESTILOS DE LA CABECERA --- */
        .cabecera-novedades {
            width: 100%;

            display: flex;

            align-items: center;

        /* --- ESTILOS DE LAS TARJETAS / FRANJAS DE LISTADO --- */
        .lista-tutoriales { display: flex; flex-direction: column; gap: 20px; }
        
        .tarjeta-tutorial {
            display: flex;
            background-color: #1a1a1a;
            border: 1px solid #252525;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            text-decoration: none;
            color: inherit;
        }
        .tarjeta-tutorial:hover {
            transform: translateY(-2px);
            border-color: #ff0055;
        }
        .info-tarjeta { flex: 1; padding: 15px 20px; display: flex; flex-direction: column; justify-content: center; }
        .info-tarjeta h3 { color: #ffffff; font-size: 1.1rem; margin-bottom: 5px; transition: color 0.2s; }
        .tarjeta-tutorial:hover .info-tarjeta h3 { color: #ff0055; }
        .info-tarjeta p { color: #aaaaaa; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .grid-shortcuts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 35px 0; }
        .grid-shortcuts img { width: 100%; height: auto; border-radius: 6px; border: 1px solid #222; }
        .box-tip { padding: 20px; margin: 30px 0; border-radius: 0 8px 8px 0; }
        .box-tip.blue { background-color: #1e1e1e; border-left: 4px solid #0076ff; }
        .box-tip.pink { background-color: #1e1e1e; border-left: 4px solid #ff0055; }

        /* --- BOTÓN CTA GOOGLE NEWS --- */
        .cta-google-news {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1e1e1e 0%, #151515 100%);
            border: 1px solid #333;
            border-left: 4px solid #4285F4;

            border-radius: 6px;

        }
        .cta-texto h5 { color: #ffffff; font-size: 1.1rem; margin-bottom: 4px; }
        .cta-texto p { color: #aaaaaa; font-size: 0.85rem; }
        .btn-cta-news {
            background-color: #ffffff;
            color: #121212;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-cta-news:hover {
            background-color: #4285F4;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(66, 133, 244, 0.4);
        }

        /* --- SECCIÓN RECOMENDADOS (DEBAJO DEL POST) --- */
        .seccion-recomendados { margin-top: 50px; border-top: 2px solid #252525; padding-top: 35px; }
        .seccion-recomendados h4 { font-size: 1.4rem; color: #ffffff; margin-bottom: 25px; border-left: 4px solid #ff0055; padding-left: 12px; }

        /* --- FOOTER CENTRADO --- */
        .footer-legal { width: 100%; background-color: #070707; border-top: 1px solid #1a1a1a; padding: 40px 20px; text-align: center; margin-top: 60px; }
        .links-legales { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .links-legales a { color: #888888; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: color 0.3s ease; }
        .links-legales a:hover { color: #ff0055; }
        .footer-legal p { color: #555555; font-size: 0.8rem; margin: 0; }

        /* --- ADAPTABILIDAD SMARTPHONES --- */
        @media (max-width: 768px) {

        /* Estilos para el contenido del artículo cargado */

            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }

    <!-- SCRIPT DEL MOTOR DINÁMICO DEL BLOG -->
    <script>
        // BASE DE DATOS DE NOVEDADES INTERNAS (El último elemento de esta lista siempre cargará por defecto)
        const novedades = [
            {
                id: "d-mini-behringer",
                titulo: "D MINI de Behringer: Minimoog de bolsillo con un secuenciador, filtro ladder y tres osciladores analógicos",
                categoria: "Ultimas noticias en el mundo del audio y la produccion musical",
                resumen: "Behringer inicia la preventa de su D MINI, una versión compacta del Model D que cuenta con tres osciladores analógicos, un filtro escalera paso-bajo, un secuenciador de 16 pasos y 27 teclas táctiles. Se espera que esté disponible en agosto de 2026 a un precio estimado de 99€ o 99$.",
                imagenCover: "imagenes/Behringer-Model-D-Soul@2000x1500.jpg",
                archivoUrl: "posts/d-mini-behringer.html",
                esExterno: true
            }
            
           {
                id: "abletonlive-live-12-4",
                titulo: "Ableton Live 12.4: Revolución en Workflow, Plugins y Separación de Stems",
                categoria: "Categoría: Novedades & Software Update | Por: RVC Studio",
                resumen: "La llegada de Ableton Live 12.4 marca un paso adelante decisivo en la optimización del flujo de trabajo y el procesamiento nativo..",
                imagenCover: "imagenes/Ableton-live-12-4-imagenes/stem-seperation-in-live.jpg",
                esExterno: true,
                archivoUrl: "posts/ableton-live-12-4.html"
            }
            
            // Aquí puedes agregar más novedades siguiendo este formato
            // {
            //     id: "otra-novedad",
            //     titulo: "Título de la novedad",
            //     categoria: "Categoría",
            //     resumen: "Resumen breve...",
            //     imagenCover: "imagenes/cover.jpg",
            //     archivoUrl: "posts/otra-novedad.html",
            //     esExterno: true
            // }
        ];

        // FUNCIÓN QUE RENDERIZA EL ARTÍCULO Y SUS RECOMENDADOS
        function mostrarNovedad(id) {
            const postSeleccionado = novedades.find(p => p.id === id);
            if (!postSeleccionado) {
                console.error("Novedad no encontrada con ID:", id);
                return;
            }

            const contenedorContenido = document.getElementById("contenido-del-tutorial");
            
            // Mostrar spinner de carga
            contenedorContenido.innerHTML = `<div class="loading-spinner">Cargando artículo...</div>`;

            // Actualizar título de la página
            document.title = postSeleccionado.titulo + " | Record Very Clean";

            // Si el post está configurado como externo, hace fetch inteligente con fallbacks
            if (postSeleccionado.esExterno) {
                
                // Definimos un conjunto de rutas probables por si hay un error tipográfico
                const rutasAProbar = [
                    postSeleccionado.archivoUrl,      // "posts/d-mini-behringer.html"
                    "post/" + postSeleccionado.id + ".html",  // "post/d-mini-behringer.html"
                    postSeleccionado.id + ".html",      // "d-mini-behringer.html"
                    "./" + postSeleccionado.id + ".html",
                    "posts/" + postSeleccionado.id + ".html"
                ];

                // Función interna recursiva para intentar una ruta tras otra
                function probarFetch(index) {
                    if (index >= rutasAProbar.length) {
                        // Si todas las rutas fallaron, mostramos el error final explicativo
                        contenedorContenido.innerHTML = `
                            <div style="padding: 40px; text-align: center; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;">
                                <h2 style="color: #ff0055; margin-bottom: 15px;">Error al cargar el artículo</h2>
                                <p style="color: #aaaaaa; max-width: 500px; margin: 0 auto; line-height: 1.6; margin-bottom: 15px;">
                                    No hemos podido localizar el archivo del artículo en tu repositorio.
                                </p>
                                <p style="color: #cccccc; font-size: 0.9em; text-align: left; max-width: 500px; margin: 0 auto; background: #222; padding: 15px; border-radius: 6px;">
                                    <strong>Verifica en tu GitHub:</strong><br>
                                    1. Que creaste una carpeta llamada <code style="color:#ff0055;">posts</code> en tu repositorio principal.<br>
                                    2. Que dentro de esa carpeta subiste el archivo <code style="color:#ff0055;">${postSeleccionado.id}.html</code>.<br>
                                    3. Que el nombre del archivo coincide exactamente (incluye mayúsculas/minúsculas).
                                </p>
                                <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:#ff0055; color:white; border:none; border-radius:4px; cursor:pointer;">
                                    🔄 Intentar de nuevo
                                </button>
                            </div>
                        `;
                        return;
                    }

                    const rutaActual = rutasAProbar[index];
                    console.log("Intentando cargar desde:", rutaActual);
                    
                    fetch(rutaActual)
                        .then(response => {
                            if (!response.ok) throw new Error("No encontrado (HTTP " + response.status + ")");
                            return response.text();
                        })
                        .then(data => {
                            // Si lo carga correctamente, inyectamos el HTML y paramos la búsqueda
                            contenedorContenido.innerHTML = `<div class="articulo-cargado">${data}</div>`;
                            
                            // Añadir clase al body para estilos específicos si es necesario
                            document.body.classList.add('articulo-cargado-body');
                            
                            // Disparar evento para analytics si lo deseas
                            if (typeof gtag !== 'undefined') {
                                gtag('event', 'view_item', {
                                    'items': [{
                                        'id': postSeleccionado.id,
                                        'name': postSeleccionado.titulo,
                                        'category': postSeleccionado.categoria
                                    }]
                                });
                            }
                        })
                        .catch(error => {
                            console.warn("Error en ruta:", rutaActual, error.message);
                            // Si falla esta ruta, intentamos automáticamente la siguiente
                            probarFetch(index + 1);
                        });
                }

                // Iniciamos la prueba secuencial en la ruta index 0
                probarFetch(0);

            } else {
                // Si es un post interno clásico, lo renderiza directo
                contenedorContenido.innerHTML = `<div class="articulo-cargado">${postSeleccionado.htmlCompleto || 'Contenido no disponible'}</div>`;
            }

            // Renderizar la sección de recomendados (todos menos el activo)
            const restantes = novedades.filter(p => p.id !== id);
            const contenedorRestantes = document.getElementById("contenedor-lista-recomendados");
            contenedorRestantes.innerHTML = "";

            if (restantes.length === 0) {
                contenedorRestantes.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #666;">
                        <p>No hay más novedades disponibles en este momento.</p>
                        <p style="font-size: 0.8rem; margin-top: 10px;">Vuelve pronto para más contenido.</p>
                    </div>
                `;
            } else {
                restantes.forEach(post => {
                    contenedorRestantes.innerHTML += `
                        <div class="tarjeta-tutorial" onclick="mostrarNovedad('${post.id}')">
                            <div class="info-tarjeta">
                                <h3>${post.titulo}</h3>
                                <p>${post.resumen}</p>
                            </div>
                            <div class="img-tarjeta" style="background-image: url('${post.imagenCover}'); background-size: cover; background-position: center;"></div>
                        </div>
                    `;
                });
            }

            // Scroll suave al inicio
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // LÓGICA AUTOMÁTICA EN LA CARGA de la PÁGINA
        window.onload = function() {
            if (novedades.length > 0) {
                // Busca automáticamente el último elemento del array 'novedades' para cargarlo de primero
                const ultimaNovedad = novedades[novedades.length - 1];
                mostrarNovedad(ultimaNovedad.id);
            } else {
                document.getElementById("contenido-del-tutorial").innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <h2 style="color: #ff0055;">No hay novedades disponibles</h2>
                        <p style="color: #888; margin-top: 15px;">Pronto añadiremos nuevo contenido.</p>
                    </div>
                `;
            }
        };

        // Exponer la función globalmente para que funcione desde onclick en HTML
        window.mostrarNovedad = mostrarNovedad;

        console.log("🚀 Motor de novedades cargado correctamente");
        console.log("📰 Novedades disponibles:", novedades.length);
    </script>
