<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novedades y Tutoriales | RVC Studio</title>

    <!-- Google Config Snippet -->
    <meta name="google-site-verification" content="TU_CODIGO_DE_VERIFICACION_GSC_AQUI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-04WYB34N23"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-04WYB34N23');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7103017241533415" crossorigin="anonymous"></script>

    <style>
        body { background-color: #0b0b0b; color: #ffffff; font-family: sans-serif; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .post-list { display: flex; flex-direction: column; gap: 20px; }
        .post-item { 
            display: flex; align-items: center; gap: 20px; 
            background: #1a1a1a; padding: 15px; border-radius: 8px; 
            cursor: pointer; text-decoration: none; color: white; transition: 0.3s;
        }
        .post-item:hover { background: #262626; }
        .post-item img { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; }
        
        #content-area { margin-top: 30px; }
        .back-btn { display: inline-block; padding: 10px 20px; background: #ff0055; color: white; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Novedades</h1>
        <div id="main-view">
            <div id="post-list" class="post-list"></div>
        </div>
        <div id="content-area"></div>
    </div>

    <script>
        // 1. Aquí defines tu lista de artículos
        const posts = [
            { id: "posts/d-mini-behringer.html", titulo: "D MINI Behringer", descripcion: "Minimoog de bolsillo con un secuenciador, filtro ladder y tres osciladores analógicos.", imagen: "imagenes/Behringer-Model-D-Soul@2000x1500.jpg" }
        ];

        const listContainer = document.getElementById('post-list');
        const mainView = document.getElementById('main-view');
        const contentArea = document.getElementById('content-area');

        // 2. Renderizar lista y asignar el evento click
        posts.forEach(post => {
            const item = document.createElement('div');
            item.className = 'post-item';
            item.innerHTML = `
                <img src="${post.imagen}" alt="${post.titulo}" onerror="this.src='https://via.placeholder.com/120x80?text=No+Img'">
                <div><h3>${post.titulo}</h3><p>${post.descripcion}</p></div>
            `;
            // AQUÍ ESTÁ LA MAGIA: Al hacer clic, llama a loadPost con el ID
            item.onclick = () => loadPost(post.id);
            listContainer.appendChild(item);
        });

        // 3. Función loadPost que trae el contenido
        async function loadPost(id) {
            try {
                // Esto busca el archivo en la carpeta /posts/
                const response = await fetch(`posts/${id}.html`);
                const html = await response.text();
                
                // Ocultamos la lista y mostramos el contenido
                mainView.style.display = 'none';
                contentArea.innerHTML = `
                    <div class="back-btn" onclick="location.reload()">← Volver a Novedades</div>
                    <div class="post-content">${html}</div>
                `;
            } catch (e) {
                contentArea.innerHTML = "<p>Error al cargar el artículo.</p>";
            }
        }
    </script>
</body>
</html>
