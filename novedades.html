    <style>
        /* --- ESTILOS GENERALES Y RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; line-height: 1.6; }
        
        /* --- ESTILOS DE LA CABECERA --- */
        .cabecera-novedades {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;

            top: 0;

        }
        .logo-nav img { max-height: 50px; width: auto; }

        .nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-menu a:hover { color: #ff0055; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .contenedor-blog { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* --- ESTILOS DE LAS TARJETAS / FRANJAS DE LISTADO --- */
        .lista-tutoriales { display: flex; flex-direction: column; gap: 20px; }
        
        .tarjeta-tutorial {
            display: flex;
            background-color: #1a1a1a;
            border: 1px solid #252525;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            text-decoration: none;
            color: inherit;
        }
        .tarjeta-tutorial:hover {
            transform: translateY(-2px);
            border-color: #ff0055;
        }
        .info-tarjeta { flex: 1; padding: 15px 20px; display: flex; flex-direction: column; justify-content: center; }
        .info-tarjeta h3 { color: #ffffff; font-size: 1.1rem; margin-bottom: 5px; transition: color 0.2s; }
        .tarjeta-tutorial:hover .info-tarjeta h3 { color: #ff0055; }
        .info-tarjeta p { color: #aaaaaa; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .img-tarjeta { width: 20%; min-width: 120px; background-size: cover; background-position: center; }

        /* --- CONTENEDOR DE ARTÍCULO ABIERTO --- */
        .articulo-completo { margin-bottom: 40px; }

        /* --- ELEMENTOS INTERNOS DE LOS TUTORIALES --- */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 8px; margin: 30px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.7); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .grid-shortcuts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 35px 0; }
        .grid-shortcuts img { width: 100%; height: auto; border-radius: 6px; border: 1px solid #222; }
        .box-tip { padding: 20px; margin: 30px 0; border-radius: 0 8px 8px 0; }
        .box-tip.blue { background-color: #1e1e1e; border-left: 4px solid #0076ff; }
        .box-tip.pink { background-color: #1e1e1e; border-left: 4px solid #ff0055; }

        /* --- BOTÓN CTA GOOGLE NEWS --- */
        .cta-google-news {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1e1e1e 0%, #151515 100%);
            border: 1px solid #333;
            border-left: 4px solid #4285F4;
            padding: 20px;
            border-radius: 6px;
            margin: 35px 0;

        .cta-texto h5 { color: #ffffff; font-size: 1.1rem; margin-bottom: 4px; }
        .cta-texto p { color: #aaaaaa; font-size: 0.85rem; }
        .btn-cta-news {
            background-color: #ffffff;
            color: #121212;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-cta-news:hover {
            background-color: #4285F4;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(66, 133, 244, 0.4);
        }

        /* --- SECCIÓN RECOMENDADOS (DEBAJO DEL POST) --- */
        .seccion-recomendados { margin-top: 50px; border-top: 2px solid #252525; padding-top: 35px; }
        .seccion-recomendados h4 { font-size: 1.4rem; color: #ffffff; margin-bottom: 25px; border-left: 4px solid #ff0055; padding-left: 12px; }

        /* --- FOOTER CENTRADO --- */
        .footer-legal { width: 100%; background-color: #070707; border-top: 1px solid #1a1a1a; padding: 40px 20px; text-align: center; margin-top: 60px; }
        .links-legales { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .links-legales a { color: #888888; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: color 0.3s ease; }
        .links-legales a:hover { color: #ff0055; }
        .footer-legal p { color: #555555; font-size: 0.8rem; margin: 0; }

        /* --- ADAPTABILIDAD SMARTPHONES --- */
        @media (max-width: 768px) {
            .cabecera-novedades { padding: 15px 20px; }
            .tarjeta-tutorial { flex-direction: column-reverse; }
            .img-tarjeta { width: 100%; height: 120px; }
            .links-legales { gap: 15px; }
            .cta-google-news { flex-direction: column; text-align: center; gap: 15px; }
        }

        /* Estilos para el contenido del artículo cargado */
        .articulo-cargado img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }
        .articulo-cargado h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .articulo-cargado h2 {
            color: #ff0055;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .articulo-cargado p {
            color: #cccccc;
            margin-bottom: 15px;
            line-height: 1.8;
        }
        .articulo-cargado ul, .articulo-cargado ol {
            color: #cccccc;
            margin-left: 20px;
            margin-bottom: 15px;
        }
        .articulo-cargado li {
            margin-bottom: 8px;
        }
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            color: #888888;
        }
        .loading-spinner::after {
            content: "⏳";
            display: block;
            font-size: 3rem;
            margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Error styling */
        .error-container {
            padding: 40px;
            text-align: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .error-container h2 {

        .error-container p {

        }
        .error-container code {
            color: #ff0055;

            max-width: 500px;

        .btn-retry {
            margin-top: 20px;

            background: #ff0055;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-retry:hover {
            background: #cc0044;
        }

    <!-- SCRIPT DEL MOTOR DINÁMICO DEL BLOG -->
    <script>
        // BASE DE DATOS DE NOVEDADES INTERNAS
       const novedades = [
    {
        id: "d-mini-behringer",
        titulo: "D MINI de Behringer: Minimoog de bolsillo con un secuenciador, filtro ladder y tres osciladores analógicos",
        categoria: "Ultimas noticias en el mundo del audio y la produccion musical",

        imagenCover: "imagenes/Behringer-Model-D-Soul@2000x1500.jpg",
        archivoUrl: "posts/d-mini-behringer.html",
        esExterno: true
    },
    {
        id: "abletonlive-live-12-4",
        titulo: "Ableton Live 12.4: Revolución en Workflow, Plugins y Separación de Stems",
        categoria: "Categoría: Novedades & Software Update | Por: RVC Studio",
        resumen: "La llegada de Ableton Live 12.4 marca un paso adelante decisivo en la optimización del flujo de trabajo y el procesamiento nativo.",
        imagenCover: "imagenes/ableton-live-12-4/stem-seperation-in-live.jpg",
        esExterno: true,
        archivoUrl: "posts/ableton-live-12-4.html"
    },
    {
        id: "compresion-de-voces",
        titulo: "Compresion de Voces: Tecnicas Pro para Lograr Voces Al Frente en tu Mezcla", 
        categoria: "Mezcla & Procesamiento | Por: RVC Studio",
        resumen: "La voz es el elemento mas importante de casi cualquier produccion musical. Sin embargo, lograr que suene potente, consistente, intima y que corte a traves de una mezcla instrumental densa es uno de los mayores desafios para los ingenieros de sonido.",
        imagenCover: "imagenes/compresion-de-voces/1176-tipo-fet.jpg",
        esExterno: true,
        archivoUrl: "posts/compresion-de-voces.html"
    },
    {
        id: "cpu-cuanticos-y-audio-digital",
        titulo: "Procesadores Cuánticos y el Audio Digital: La Próxima Revolución del Sonido", 
        categoria: "Categoría: Tecnología & Futuro del Audio | Por: RVC Studio",
        resumen: "La llegada de los procesadores cuánticos al campo del audio digital no sustituirá inmediatamente tu equipo de estudio actual, pero transformará la industria desde sus cimientos musicales y técnicos.",
        imagenCover: "imagenes/cpu-cuanticos-y-el-audio-digital/tech-cuantica.jpg",
        esExterno: true,
        archivoUrl: "posts/cpu-cuanticos-y-el-audio-digital.html"
    },
    {
        id: "hz-profundidad-bits",
        titulo: "Frecuencia de Muestreo y Calidad de Audio: Lo que Realmente Debes Entender", 
        categoria: "Categoría: Teoría del Audio & Conceptos Clave | Por: RVC Studio",
        resumen: "Imaginemos el proceso de fabricación de unas baquetas. Supongamos que queremos crear unas baquetas resistentes y duraderas. Si utilizamos una madera de mala calidad o una madera hinchada y húmeda, difícilmente obtendremos un producto final confiable, independientemente del esfuerzo, maquinaria o barniz que pongamos en su fabricación. La razón es sencilla: la calidad del producto final depende directamente de la calidad de la materia prima.",
        imagenCover: "imagenes/hz-profundidad-bits/portada.jpg",
        esExterno: true,
        archivoUrl: "posts/hz-profundidad-bits.html"
    },
    {
        id: "cadena-plugins-urbana",
        titulo: "La Cadena de Plugins Urbana: El Secreto del Sonido Vocal de la Industria", // ✅ Eliminado el "<" sobrante
        categoria: "Categoría: Mezcla & Procesamiento de Voces | Por: RVC Studio",
        resumen: "Para lograr ese sonido vocal urbano clásico de la industria —brillante, al frente, controlado y con esa textura costosa que escuchas en el Reggaeton, Trap o R&B actual— necesitas una combinación precisa de corrección de tono, control dinámico estricto, ecualización quirúrgica y saturación analógica sutil. No es magia; es estructura de señal.",
        imagenCover: "imagenes/cadena-plugins-urbana/waves-ssl-ev2.jpg",
        esExterno: true,
        archivoUrl: "posts/cadena-plugins-urbana.html"
    }                 
    // ✅ Eliminado el comentario que causaba error
];

        // Función mejorada para cargar contenido con más opciones de ruta
        async function cargarContenido(post) {
            const contenedor = document.getElementById("contenido-del-tutorial");
            
            // Si no hay archivo externo, mostrar mensaje
            if (!post.esExterno || !post.archivoUrl) {
                contenedor.innerHTML = `
                    <div class="error-container">
                        <h2>⚠️ Contenido no disponible</h2>
                        <p>Este artículo no tiene contenido asociado.</p>
                    </div>
                `;
                return;
            }

            // Definir rutas a probar (priorizando la ruta configurada)
            const rutas = [
                post.archivoUrl,  // "posts/novedad.html"
                post.archivoUrl.replace('posts/', ''),  // "novedad.html"
                './' + post.archivoUrl,
                'posts/' + post.id + '.html',
                post.id + '.html'
            ];

            // Intentar cargar desde las diferentes rutas
            for (const ruta of rutas) {
                try {
                    console.log(`🔄 Intentando cargar: ${ruta}`);
                    const response = await fetch(ruta);
                    
                    if (response.ok) {
                        const html = await response.text();
                        contenedor.innerHTML = `<div class="articulo-cargado">${html}</div>`;
                        console.log(`✅ Cargado exitosamente desde: ${ruta}`);
                        return;
                    }
                } catch (error) {
                    console.warn(`❌ Falló ruta: ${ruta}`, error.message);
                }
            }

            // Si todas las rutas fallaron, mostrar error detallado
            contenedor.innerHTML = `
                <div class="error-container">
                    <h2>❌ Error al cargar el artículo</h2>
                    <p>No hemos podido localizar el archivo del artículo en tu repositorio.</p>
                    <div class="debug-info">
                        <strong>🔍 Verifica en tu GitHub:</strong><br>
                        1. Que creaste una carpeta llamada <code>posts</code> en tu repositorio principal.<br>
                        2. Que dentro de esa carpeta subiste el archivo <code>${post.id}.html</code>.<br>
                        3. Que el nombre del archivo coincide exactamente (incluye mayúsculas/minúsculas).<br>
                        4. Rutas intentadas:
                        <ul style="margin-top: 10px; list-style: none; padding: 0;">
                            ${rutas.map(r => `<li style="padding: 4px 0; color: #888;">• ${r}</li>`).join('')}
                        </ul>
                    </div>
                    <button class="btn-retry" onclick="location.reload()">🔄 Intentar de nuevo</button>
                </div>
            `;
        }

        // FUNCIÓN QUE RENDERIZA EL ARTÍCULO Y SUS RECOMENDADOS
        function mostrarNovedad(id) {
            const postSeleccionado = novedades.find(p => p.id === id);
            if (!postSeleccionado) {
                console.error("❌ Novedad no encontrada con ID:", id);
                return;
            }

            // Actualizar título de la página
            document.title = postSeleccionado.titulo + " | Record Very Clean";

            // Cargar el contenido del artículo
            cargarContenido(postSeleccionado);

            // Renderizar la sección de recomendados
            renderizarRecomendados(id);

            // Scroll suave al inicio
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Función para renderizar los artículos recomendados
        function renderizarRecomendados(idActual) {
            const restantes = novedades.filter(p => p.id !== idActual);
            const contenedor = document.getElementById("contenedor-lista-recomendados");
            contenedor.innerHTML = "";

            if (restantes.length === 0) {
                contenedor.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #666;">
                        <p>No hay más novedades disponibles en este momento.</p>
                        <p style="font-size: 0.8rem; margin-top: 10px;">Vuelve pronto para más contenido.</p>
                    </div>
                `;
                return;
            }

            restantes.forEach(post => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-tutorial';
                tarjeta.onclick = () => mostrarNovedad(post.id);
                tarjeta.innerHTML = `
                    <div class="info-tarjeta">
                        <h3>${post.titulo}</h3>
                        <p>${post.resumen}</p>
                    </div>
                    <div class="img-tarjeta" style="background-image: url('${post.imagenCover}'); background-size: cover; background-position: center;"></div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // LÓGICA AUTOMÁTICA EN LA CARGA DE LA PÁGINA
        window.onload = function() {
            if (novedades.length > 0) {
                // Carga el último elemento del array
                const ultimaNovedad = novedades[novedades.length - 1];
                mostrarNovedad(ultimaNovedad.id);
            } else {
                document.getElementById("contenido-del-tutorial").innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <h2 style="color: #ff0055;">No hay novedades disponibles</h2>
                        <p style="color: #888; margin-top: 15px;">Pronto añadiremos nuevo contenido.</p>
                    </div>
                `;
            }
        };

        // Exponer la función globalmente
        window.mostrarNovedad = mostrarNovedad;

        console.log("🚀 Motor de novedades cargado correctamente");
        console.log(`📰 Novedades disponibles: ${novedades.length}`);
        console.log("📋 Lista de novedades:", novedades.map(n => n.id).join(', '));
    </script>
