    <style>
        /* --- ESTILOS GENERALES Y RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; line-height: 1.6; }
        
        /* --- ESTILOS DE LA CABECERA --- */
        .cabecera-novedades {
            width: 100%;
            padding: 20px 50px;

            top: 0;

        .nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-menu a:hover { color: #ff0055; }

        /* --- ESTILOS DE LAS TARJETAS / FRANJAS DE LISTADO --- */

        .tarjeta-tutorial {
            display: flex;
            background-color: #1a1a1a;
            border: 1px solid #252525;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            text-decoration: none;
            color: inherit;
        }
        .tarjeta-tutorial:hover {
            transform: translateY(-2px);
            border-color: #ff0055;
        }
        .info-tarjeta { flex: 1; padding: 15px 20px; display: flex; flex-direction: column; justify-content: center; }
        .info-tarjeta h3 { color: #ffffff; font-size: 1.1rem; margin-bottom: 5px; transition: color 0.2s; }
        .tarjeta-tutorial:hover .info-tarjeta h3 { color: #ff0055; }
        .info-tarjeta p { color: #aaaaaa; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .img-tarjeta { width: 20%; min-width: 120px; background-size: cover; background-position: center; }

        /* --- CONTENEDOR DE ARTÍCULO ABIERTO --- */
        .articulo-completo { margin-bottom: 40px; }

        /* --- ELEMENTOS INTERNOS DE LOS TUTORIALES --- */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 8px; margin: 30px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.7); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .grid-shortcuts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 35px 0; }
        .grid-shortcuts img { width: 100%; height: auto; border-radius: 6px; border: 1px solid #222; }
        .box-tip { padding: 20px; margin: 30px 0; border-radius: 0 8px 8px 0; }
        .box-tip.blue { background-color: #1e1e1e; border-left: 4px solid #0076ff; }
        .box-tip.pink { background-color: #1e1e1e; border-left: 4px solid #ff0055; }

        /* --- BOTÓN CTA GOOGLE NEWS --- */
        .cta-google-news {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1e1e1e 0%, #151515 100%);
            border: 1px solid #333;
            border-left: 4px solid #4285F4;
            padding: 20px;
            border-radius: 6px;
            margin: 35px 0;
        }
        .cta-texto h5 { color: #ffffff; font-size: 1.1rem; margin-bottom: 4px; }
        .cta-texto p { color: #aaaaaa; font-size: 0.85rem; }
        .btn-cta-news {
            background-color: #ffffff;
            color: #121212;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-cta-news:hover {
            background-color: #4285F4;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(66, 133, 244, 0.4);
        }

        /* --- SECCIÓN RECOMENDADOS (DEBAJO DEL POST) --- */
        .seccion-recomendados { margin-top: 50px; border-top: 2px solid #252525; padding-top: 35px; }
        .seccion-recomendados h4 { font-size: 1.4rem; color: #ffffff; margin-bottom: 25px; border-left: 4px solid #ff0055; padding-left: 12px; }

        /* --- FOOTER CENTRADO --- */

        .links-legales { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .links-legales a { color: #888888; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: color 0.3s ease; }
        .links-legales a:hover { color: #ff0055; }

        /* --- ADAPTABILIDAD SMARTPHONES --- */

            .tarjeta-tutorial { flex-direction: column-reverse; }
            .img-tarjeta { width: 100%; height: 120px; }
            .links-legales { gap: 15px; }
            .cta-google-news { flex-direction: column; text-align: center; gap: 15px; }

<body>

    <!-- SCRIPT DEL MOTOR DINÁMICO DEL BLOG -->
    <script>
        // BASE DE DATOS DE TUTORIALES INTERNOS (El último elemento de esta lista siempre cargará por defecto)
        const novedades = [
            {
                id: "d-mini-behringer.html",
                titulo: "D MINI de Behringer: Minimoog de bolsillo con un secuenciador, filtro ladder y tres osciladores analógicos",
                categoria: "Ultimas noticias en el mundo del audio y la produccion musical",
                resumen: " Behringer inicia la preventa de su D MINI, una versión compacta del Model D que cuenta con tres osciladores analógicos, un filtro escalera paso-bajo, un secuenciador de 16 pasos y 27 teclas táctiles. Se espera que esté disponible en agosto de 2026 a un precio estimado de 99€ o 99$.",
                imagenCover: "imagenes/Behringer-Model-D-Soul@2000x1500.jpg",
                esExterno: true,
                archivoUrl: "posts/d-mini-behringer.html"
            }
        ];

        // FUNCIÓN QUE RENDERIZA EL ARTÍCULO Y SUS RECOMENDADOS
        function mostrarNovedades(id) {
            const postSeleccionado = novedades.find(p => p.id === id);
            if (!postSeleccionado) return;

            const contenedorContenido = document.getElementById("contenido-del-novedades");

            // Si el post está configurado como externo, hace fetch inteligente con fallbacks
            if (postSeleccionado.esExterno) {
                
                // Definimos un conjunto de rutas probables por si hay un error tipográfico en el nombre de la carpeta en GitHub (post vs posts)
                const rutasAProbar = [
                    postSeleccionado.archivoUrl,   // 1. "posts/tutorial-4.html"
                    "post/d-mini-behringer.html",        // 2. "post/tutorial-4.html" (Singular)
                    "d-mini-behringer.html",             // 3. En la raíz principal
                    "./posts/d-mini-behringer.html"
                ];

                // Función interna recursiva para intentar una ruta tras otra
                function probarFetch(index) {
                    if (index >= rutasAProbar.length) {
                        // Si todas las rutas fallaron, mostramos el error final explicativo
                        contenedorContenido.innerHTML = `
                            <div style="padding: 40px; text-align: center; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;">
                                <h2 style="color: #ff0055; margin-bottom: 15px;">Error al cargar el tutorial</h2>
                                <p style="color: #aaaaaa; max-width: 500px; margin: 0 auto; line-height: 1.6; margin-bottom: 15px;">
                                    No hemos podido localizar el archivo del tutorial en tu repositorio de GitHub.
                                </p>
                                <p style="color: #cccccc; font-size: 0.9em; text-align: left; max-width: 500px; margin: 0 auto; background: #222; padding: 15px; border-radius: 6px;">
                                    <strong>Por favor revisa en tu GitHub:</strong><br>
                                    1. Que creaste una carpeta llamada exactamente <code style="color:#ff0055;">posts</code> (o <code style="color:#ff0055;">post</code>) en tu repositorio principal.<br>
                                    2. Que dentro de esa carpeta subiste el archivo llamado exactamente <code style="color:#ff0055;">tutorial-4.html</code> (todo en minúsculas).
                                </p>
                            </div>
                        `;
                        return;
                    }

                    const rutaActual = rutasAProbar[index];
                    
                    fetch(rutaActual)
                        .then(response => {
                            if (!response.ok) throw new Error("No encontrado");
                            return response.text();
                        })
                        .then(data => {
                            // Si lo carga correctamente, inyectamos el HTML y paramos la búsqueda
                            contenedorContenido.innerHTML = data;
                        })
                        .catch(() => {
                            // Si falla esta ruta, intentamos automáticamente la siguiente en la lista
                            probarFetch(index + 1);
                        });
                }

                // Iniciamos la prueba secuencial en la ruta index 0
                probarFetch(0);

            } else {
                // Si es un post interno clásico, lo renderiza directo
                contenedorContenido.innerHTML = postSeleccionado.htmlCompleto;
            }

            // Renderizar la sección de recomendados (todos menos el activo)
            const restantes = tutoriales.filter(p => p.id !== id);
            const contenedorRestantes = document.getElementById("contenedor-lista-recomendados");
            contenedorRestantes.innerHTML = "";

            restantes.forEach(post => {
                contenedorRestantes.innerHTML += `
                    <div class="tarjeta-tutorial" onclick="mostrarTutorial('${post.id}')">
                        <div class="info-tarjeta">
                            <h3>${post.titulo}</h3>
                            <p>${post.resumen}</p>
                        </div>
                        <div class="img-tarjeta" style="background-image: url('${post.imagenCover}');"></div>
                    </div>
                `;
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // LÓGICA AUTOMÁTICA EN LA CARGA de la PÁGINA
        window.onload = function() {
            if (tutoriales.length > 0) {
                // Busca automáticamente el último elemento del array 'tutoriales' para cargarlo de primero
                const ultimoTutorial = tutoriales[tutoriales.length - 1];
                mostrarTutorial(ultimoTutorial.id);
            }
        };
    </script>
