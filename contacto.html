<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | RVC Studio</title>

    <!-- Google Search Console & Analytics -->
    <meta name="google-site-verification" content="TU_CODIGO_DE_VERIFICACION_GSC_AQUI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-04WYB34N23"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-04WYB34N23');
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0b0b; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; line-height: 1.6; padding-bottom: 80px; }
        
        .cabecera-novedades { width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; background-color: #070707; position: sticky; top: 0; z-index: 100; }
        .logo-nav img { max-height: 50px; width: auto; }
        .nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.3s ease; text-transform: uppercase; }
        .nav-menu a:hover { color: #ff0055; }

        .contenedor-contacto { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .titulo-principal { font-size: 2.5rem; font-weight: 800; margin-bottom: 40px; text-transform: uppercase; border-left: 4px solid #ff0055; padding-left: 15px; }
        .titulo-principal span { color: #ff0055; }

        .grid-contacto { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; }
        .form-bloque { background-color: #141414; border: 1px solid #222; border-radius: 12px; padding: 40px; }
        .grupo-campo { margin-bottom: 20px; }
        .grupo-campo label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaaaaa; }
        .grupo-campo input, .grupo-campo textarea { 
            width: 100%; 
            background-color: #0b0b0b; 
            border: 1px solid #333; 
            border-radius: 6px; 
            padding: 12px 15px; 
            color: #ffffff;
            transition: border-color 0.3s ease;
        }
        .grupo-campo input:focus, .grupo-campo textarea:focus {
            outline: none;
            border-color: #ff0055;
        }
        .btn-enviar { 
            background-color: #ff0055; 
            color: #ffffff; 
            border: none; 
            padding: 14px 28px; 
            font-weight: 700; 
            text-transform: uppercase; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.3s; 
        }
        .btn-enviar:hover { background-color: #d60048; }
        .btn-enviar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .caja-info { background-color: #141414; border: 1px solid #222; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .email-contacto { font-family: monospace; background-color: #0b0b0b; padding: 8px 12px; border-radius: 4px; border: 1px solid #222; color: #ff0055; display: inline-block; margin-top: 10px; }
        
        /* Estilos para mensajes de éxito/error */
        .mensaje-form {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .mensaje-exito {
            background-color: #0a2a1a;
            border: 1px solid #00ff88;
            color: #66ffaa;
            display: block;
        }
        .mensaje-error {
            background-color: #2a0a0a;
            border: 1px solid #ff0055;
            color: #ff6666;
            display: block;
        }
        
        @media (max-width: 768px) { .grid-contacto { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="cabecera-novedades">
        <div class="logo-nav"><a href="index.html"><img src="imagenes/rvc%20new%20logo.png" alt="RVC Studio Logo"></a></div>
        <nav class="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="servicios.html">Servicios</a>
            <a href="samples-y-drum-kit.html">Samples & Drum Kit</a>
        </nav>
    </header>

    <main class="contenedor-contacto">
        <h1 class="titulo-principal">Contacto <span>RVC Studio</span></h1>

        <div class="grid-contacto">
            <section class="form-bloque">
                <h2>Envíanos un mensaje</h2>
                
                <!-- Contenedor para mensajes -->
                <div id="formStatus"></div>
                
                <!-- FORMULARIO CON TU ID DE FORMSPREE -->
                <form 
                    id="contactForm"
                    action="https://formspree.io/f/mjgngkoz" 
                    method="POST"
                >
                    <div class="grupo-campo">
                        <label for="nombre">Tu nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="email">Tu correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="Ej: juan@gmail.com" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="asunto">Asunto</label>
                        <input type="text" id="asunto" name="asunto" placeholder="Ej: Consulta sobre mezcla" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="message" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    </div>
                    
                    <!-- REDIRECCIÓN a página de agradecimiento -->
                    <input type="hidden" name="_next" value="gracias.html">
                    
                    <!-- Desactivar captcha para pruebas (opcional) -->
                    <input type="hidden" name="_captcha" value="false">
                    
                    <button type="submit" id="submitBtn" class="btn-enviar">Enviar Mensaje</button>
                </form>
            </section>

            <aside class="info-soporte">
                <div class="caja-info">
                    <h3>✉️ Vía de Correo Directo</h3>
                    <p>Si prefieres escribirnos directamente:</p>
                    <span class="email-contacto">recordveryclean@gmail.com</span>
                </div>
            </aside>
        </div>
    </main>

    <script>
        // ============================================
        // MANEJO DEL FORMULARIO CON VALIDACIÓN
        // ============================================
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('formStatus');

        // Función para mostrar mensajes
        function mostrarMensaje(tipo, texto) {
            statusDiv.className = `mensaje-form mensaje-${tipo}`;
            statusDiv.textContent = texto;
            statusDiv.style.display = 'block';
        }

        // Función para ocultar mensajes
        function ocultarMensaje() {
            statusDiv.style.display = 'none';
            statusDiv.className = 'mensaje-form';
        }

        // Validar email
        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // Evento de envío del formulario
        form.addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevenir envío normal
            
            // Ocultar mensajes anteriores
            ocultarMensaje();
            
            // Obtener valores
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const asunto = document.getElementById('asunto').value.trim();
            const mensaje = document.getElementById('mensaje').value.trim();
            
            // Validar campos
            if (!nombre || !email || !asunto || !mensaje) {
                mostrarMensaje('error', '⚠️ Por favor, completa todos los campos.');
                return;
            }
            
            if (!validarEmail(email)) {
                mostrarMensaje('error', '⚠️ Por favor, ingresa un correo electrónico válido.');
                return;
            }
            
            // Deshabilitar botón durante el envío
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            
            try {
                // Enviar datos con fetch
                const formData = new FormData(form);
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    // Éxito - Redirigir a la página de gracias
                    // O puedes mostrar un mensaje de éxito sin redirigir
                    mostrarMensaje('exito', '✅ ¡Mensaje enviado con éxito! Te responderemos pronto.');
                    
                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'gracias.html';
                    }, 2000);
                    
                } else {
                    // Error del servidor
                    const data = await response.json();
                    mostrarMensaje('error', `❌ Error: ${data.error || 'No se pudo enviar el mensaje. Intenta de nuevo.'}`);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar Mensaje';
                }
            } catch (error) {
                // Error de red
                mostrarMensaje('error', '❌ Error de conexión. Verifica tu internet e intenta de nuevo.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Mensaje';
            }
        });
    </script>
</body>
</html>
