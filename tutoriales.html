    <style>
        /* --- ESTILOS GENERALES Y RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; line-height: 1.6; }
        
        /* --- ESTILOS DE LA CABECERA --- */

        /* --- CONTENEDOR PRINCIPAL --- */
        .contenedor-blog { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* --- ESTILOS DE LAS TARJETAS / FRANJAS DE LISTADO --- */
        .lista-tutoriales { display: flex; flex-direction: column; gap: 20px; }
        
        .tarjeta-tutorial {
            display: flex;
            background-color: #1a1a1a;

            border-radius: 8px;

        }

        .info-tarjeta h3 { color: #ffffff; font-size: 1.1rem; margin-bottom: 5px; transition: color 0.2s; }
        .tarjeta-tutorial:hover .info-tarjeta h3 { color: #ff0055; }
        .info-tarjeta p { color: #aaaaaa; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .img-tarjeta { width: 20%; min-width: 120px; background-size: cover; background-position: center; }

        /* --- CONTENEDOR DE ARTÍCULO ABIERTO --- */

        /* --- ELEMENTOS INTERNOS DE LOS TUTORIALES --- */

        .box-tip.blue { background-color: #1e1e1e; border-left: 4px solid #0076ff; }
        .box-tip.pink { background-color: #1e1e1e; border-left: 4px solid #ff0055; }

        /* --- BOTÓN CTA GOOGLE NEWS --- */
        .cta-google-news {
            display: flex;
            align-items: center;
            justify-content: space-between;

            align-items: center;
            gap: 8px;
            cursor: pointer;

            color: #ffffff;
            box-shadow: 0 0 10px rgba(66, 133, 244, 0.4);

        /* --- SECCIÓN RECOMENDADOS (DEBAJO DEL POST) --- */
        .seccion-recomendados { margin-top: 50px; border-top: 2px solid #252525; padding-top: 35px; }
        .seccion-recomendados h4 { font-size: 1.4rem; color: #ffffff; margin-bottom: 25px; border-left: 4px solid #ff0055; padding-left: 12px; }

        /* --- FOOTER CENTRADO --- */

        .links-legales { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .links-legales a { color: #888888; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: color 0.3s ease; }
        .links-legales a:hover { color: #ff0055; }
        .footer-legal p { color: #555555; font-size: 0.8rem; margin: 0; }

        /* --- ADAPTABILIDAD SMARTPHONES --- */
        @media (max-width: 768px) {
            .cabecera-novedades { padding: 15px 20px; }
            .tarjeta-tutorial { flex-direction: column-reverse; }
            .img-tarjeta { width: 100%; height: 120px; }

            .cta-google-news { flex-direction: column; text-align: center; gap: 15px; }

        /* --- ESTILOS PARA ERRORES Y CARGA --- */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            color: #888888;
        }
        .loading-spinner::after {
            content: "⏳";
            display: block;
            font-size: 3rem;
            margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .error-container {
            padding: 40px;
            text-align: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .error-container h2 {
            color: #ff0055;

        .error-container p {
            color: #aaaaaa;

        .error-container code {
            color: #ff0055;

        .error-container .debug-info {

            margin-top: 20px;

        /* Estilos para contenido cargado */

    <!-- SCRIPT DEL MOTOR DINÁMICO DEL BLOG -->
    <script>
        // ============================================================
        // BASE DE DATOS DE TUTORIALES
        // ============================================================
        const tutoriales = [
            // TUTORIAL 1: INTERNO (HTML completo dentro del script)
            {
                id: "shortcuts-flstudio",
                titulo: "Multiplica tu velocidad en FL Studio: Los atajos de teclado que cambiarán tu flujo de trabajo",
                categoria: "Producción Musical & Workflow | Por: RVC Studio",
                resumen: "¿Cansado de estar haciendo clic en el menú de herramientas cada dos segundos? Si sientes que tu flujo creativo se frena drásticamente porque pierdes el ritmo buscando la herramienta de cortar o navegando para abrir el Piano Roll, el formato de comandos es la solución ideal.",
                imagenCover: "imagenes/cover.jpg",
                esExterno: false,
                htmlCompleto: `
                    <h2 style="font-size: 2.2em; color: #ffffff; margin-bottom: 10px;">Multiplica tu velocidad en FL Studio</h2>
                    <p style="color: #aaaaaa; font-size: 0.9em; margin-bottom: 30px;">Categoría: Production Musical & Workflow | Por: RVC Studio</p>
                    <div style="margin: 25px 0; text-align: center;">
                        <img src="imagenes/cover.jpg" alt="Atajos FL Studio" style="max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #222;">
                    </div>
                    <p style="font-size: 1.1em; color: #cccccc; margin-bottom: 20px;">
                        ¿Cansado de estar haciendo clic en el menú de herramientas cada dos segundos? Si sientes que tu flujo creativo se frena drásticamente porque pierdes el ritmo buscando la herramienta de cortar o navegando para abrir el Piano Roll, no estás solo.
                    </p>
                    <p style="margin-bottom: 20px;">
                        A continuación, te presentamos una selección de los atajos indispensables que los productores profesionales utilizan a diario.
                    </p>
                    <h3 style="font-size: 1.6em; color: #ffffff; margin-top: 40px; border-bottom: 1px solid #333; padding-bottom: 8px;">El Centro de Control: Las Teclas de Función</h3>
                    <ul style="padding-left: 20px; margin: 15px 0; color: #cccccc;">
                        <li style="margin-bottom: 8px;"><strong>F5:</strong> Abre y cierra el Playlist.</li>
                        <li style="margin-bottom: 8px;"><strong>F6:</strong> Despliega el Channel Rack.</li>
                        <li style="margin-bottom: 8px;"><strong>F7:</strong> Accede al Piano Roll.</li>
                        <li style="margin-bottom: 8px;"><strong>F9:</strong> Llama al Mixer.</li>
                    </ul>
                    <div class="box-tip pink">
                        <p style="margin: 0; font-weight: bold; color: #ffffff;">🚨 El botón de emergencia:</p>
                        <p style="margin: 10px 0 0 0; color: #cccccc;">Presiona <strong>Control + H</strong> para cortar todo el audio al instante.</p>
                    </div>
                    <div class="box-tip blue">
                        <p style="margin: 0; font-weight: bold; color: #ffffff;">💡 Consejo Final:</p>
                        <p style="margin: 10px 0 0 0; color: #cccccc;">Practica estos atajos en tu próximo proyecto y verás cómo tu velocidad se multiplica.</p>
                    </div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/hEquOaPtTHQ" title="Multiplica tu velocidad en FL Studio" allowfullscreen></iframe>
                    </div>
                `
            },
            // TUTORIAL 2: EXTERNO (carga desde archivo HTML)
            {
                id: "configuracion-audio",
                titulo: "Guía Paso a Paso: Configuración de Audio desde Cero en Ableton Live",
                categoria: "Configuración & Audio Engineering | Por: RVC Studio",
                resumen: "Configurar Ableton Live para grabar audio de forma óptima es un proceso universal. No importa si el objetivo es capturar la voz para una producción de reggaetón o una línea de guitarra acústica.",
                imagenCover: "imagenes/hardware config.JPG",
                esExterno: true,
                archivoUrl: "posts/configuracion-audio.html"
            },
            // TUTORIAL 3: INTERNO
            {
                id: "orden-maqueta",
                titulo: "La Importancia del Orden al Hacer una Maqueta: Guía Paso a Paso",
                categoria: "Producción Musical & Audio | Por: RVC Studio",
                resumen: "El orden al momento de hacer una maqueta es un factor crucial que suele pasarse por alto. El desorden en las primeras etapas de producción afecta negativamente el resultado final.",
                imagenCover: "imagenes/tutorial 1 img 1.jpg",
                esExterno: false,
                htmlCompleto: `
                    <h2 style="font-size: 2.2em; color: #ffffff; margin-bottom: 10px;">La Importancia del Orden al Hacer una Maqueta</h2>
                    <p style="color: #aaaaaa; font-size: 0.9em; margin-bottom: 30px;">Categoría: Producción Musical & Audio | Por: RVC Studio</p>
                    <p style="font-size: 1.1em; color: #cccccc; margin-bottom: 20px;">
                        El orden al momento de hacer una maqueta es un factor crucial que suele pasarse por alto.
                    </p>
                    <div style="margin: 35px 0; text-align: center;">
                        <img src="imagenes/tutorial 1 img 1.jpg" alt="Orden Maqueta" style="max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #222;">
                    </div>
                    <h3 style="font-size: 1.6em; color: #ffffff; margin-top: 40px; border-bottom: 1px solid #333; padding-bottom: 8px;">Uso Eficiente de Plantillas</h3>
                    <p style="margin-top: 15px;">Contar con canales pre-configurados para tu voz principal (Lead), Voces Secundarias (Adlibs) y Dobles te ahorrará horas muertas.</p>
                    <div class="box-tip blue">
                        <p style="margin-top: 0; font-weight: bold; color: #ffffff;">🚀 Tip de Producción:</p>
                        <p style="margin: 0; color: #cccccc;">Agrupa canales con <strong>Control + G</strong> y nombra tus bloques.</p>
                    </div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/NGVofZGkvbA" title="Flujo de Trabajo Completo" allowfullscreen></iframe>
                    </div>
                `
            },
            // TUTORIAL 4: EXTERNO
            {
                id: "tutorial-4",
                titulo: "Plantilla para grabar voces en FL Studio con plugins nativos",
                categoria: "Producción Musical & Workflow | Por: RVC Studio",
                resumen: "Descubre cómo organizar tus maquetas de audio de manera limpia y profesional antes de enviarlas a mezcla.",
                imagenCover: "imagenes/tutorial-4-img/portada.jpg",
                esExterno: true,
                archivoUrl: "posts/tutorial-4.html"
            }
        ];

        // ============================================================
        // FUNCIÓN PARA CARGAR CONTENIDO EXTERNO
        // ============================================================
        async function cargarContenidoExterno(post) {
            const contenedor = document.getElementById("contenido-del-tutorial");
            
            // Mostrar spinner de carga
            contenedor.innerHTML = `<div class="loading-spinner">Cargando tutorial...</div>`;

            // Definir rutas a probar dinámicamente
            const rutas = [
                post.archivoUrl,
                post.archivoUrl.replace('posts/', ''),
                'posts/' + post.id + '.html',
                'post/' + post.id + '.html',
                './' + post.archivoUrl,
                post.id + '.html'
            ];

            // Eliminar duplicados
            const rutasUnicas = [...new Set(rutas)];

            for (const ruta of rutasUnicas) {
                try {
                    console.log(`🔄 Intentando cargar: ${ruta}`);
                    const response = await fetch(ruta);
                    
                    if (response.ok) {
                        const html = await response.text();
                        contenedor.innerHTML = `<div class="articulo-cargado">${html}</div>`;
                        console.log(`✅ Cargado exitosamente desde: ${ruta}`);
                        return true;
                    }
                } catch (error) {
                    console.warn(`❌ Falló ruta: ${ruta}`, error.message);
                }
            }

            // Si todas fallaron, mostrar error
            contenedor.innerHTML = `
                <div class="error-container">
                    <h2>❌ Error al cargar el tutorial</h2>
                    <p>No hemos podido localizar el archivo del tutorial en tu repositorio.</p>
                    <div class="debug-info">
                        <strong>🔍 Verifica en tu GitHub:</strong><br>
                        1. Que creaste una carpeta llamada <code>posts</code>.<br>
                        2. Que dentro de esa carpeta subiste el archivo <code>${post.id}.html</code>.<br>
                        3. Rutas intentadas:
                        <ul>
                            ${rutasUnicas.map(r => `<li>• ${r}</li>`).join('')}
                        </ul>
                    </div>
                    <button class="btn-retry" onclick="location.reload()">🔄 Intentar de nuevo</button>
                </div>
            `;
            return false;
        }

        // ============================================================
        // FUNCIÓN PARA MOSTRAR UN TUTORIAL
        // ============================================================
        function mostrarTutorial(id) {
            const postSeleccionado = tutoriales.find(p => p.id === id);
            if (!postSeleccionado) {
                console.error("❌ Tutorial no encontrado:", id);
                return;
            }

            // Actualizar título de la página
            document.title = postSeleccionado.titulo + " | Record Very Clean";

            const contenedorContenido = document.getElementById("contenido-del-tutorial");

            // Si es externo, cargar con fetch
            if (postSeleccionado.esExterno) {
                cargarContenidoExterno(postSeleccionado);
            } else {
                // Si es interno, mostrar el HTML directamente
                contenedorContenido.innerHTML = `<div class="articulo-cargado">${postSeleccionado.htmlCompleto}</div>`;
            }

            // Renderizar la lista de recomendados (todos menos el activo)
            const restantes = tutoriales.filter(p => p.id !== id);
            const contenedorRestantes = document.getElementById("contenedor-lista-recomendados");
            contenedorRestantes.innerHTML = "";

            if (restantes.length === 0) {
                contenedorRestantes.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #666;">
                        <p>No hay más tutoriales disponibles.</p>
                    </div>
                `;
            } else {
                restantes.forEach(post => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-tutorial';
                    tarjeta.onclick = () => mostrarTutorial(post.id);
                    tarjeta.innerHTML = `
                        <div class="info-tarjeta">
                            <h3>${post.titulo}</h3>
                            <p>${post.resumen}</p>
                        </div>
                        <div class="img-tarjeta" style="background-image: url('${post.imagenCover}'); background-size: cover; background-position: center;"></div>
                    `;
                    contenedorRestantes.appendChild(tarjeta);
                });
            }

            // Scroll suave al inicio
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================================
        // INICIALIZACIÓN AL CARGAR LA PÁGINA
        // ============================================================
        window.onload = function() {
            if (tutoriales.length > 0) {
                // Cargar el último tutorial de la lista por defecto
                const ultimoTutorial = tutoriales[tutoriales.length - 1];
                mostrarTutorial(ultimoTutorial.id);
            } else {
                document.getElementById("contenido-del-tutorial").innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <h2 style="color: #ff0055;">No hay tutoriales disponibles</h2>
                        <p style="color: #888; margin-top: 15px;">Pronto añadiremos nuevo contenido.</p>
                    </div>
                `;
            }
        };

        // Exponer la función globalmente
        window.mostrarTutorial = mostrarTutorial;

        console.log("🚀 Motor de tutoriales cargado correctamente");
        console.log(`📚 Tutoriales disponibles: ${tutoriales.length}`);
        console.log("📋 IDs:", tutoriales.map(t => t.id).join(', '));
    </script>
