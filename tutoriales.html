    <style>
        /* --- ESTILOS GENERALES Y RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; line-height: 1.6; }
        
        /* --- ESTILOS DE LA CABECERA --- */
        .cabecera-novedades {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            background-color: #070707;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-nav img { max-height: 50px; width: auto; }

        .nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-menu a:hover { color: #ff0055; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .contenedor-blog { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* --- ESTILOS DE LAS TARJETAS / FRANJAS DE LISTADO --- */
        .lista-tutoriales { display: flex; flex-direction: column; gap: 20px; }
        
        .tarjeta-tutorial {
            display: flex;
            background-color: #1a1a1a;
            border: 1px solid #252525;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            text-decoration: none;
            color: inherit;
        }
        .tarjeta-tutorial:hover {
            transform: translateY(-2px);
            border-color: #ff0055;
        }
        .info-tarjeta { flex: 1; padding: 15px 20px; display: flex; flex-direction: column; justify-content: center; }
        .info-tarjeta h3 { color: #ffffff; font-size: 1.1rem; margin-bottom: 5px; transition: color 0.2s; }
        .tarjeta-tutorial:hover .info-tarjeta h3 { color: #ff0055; }
        .info-tarjeta p { color: #aaaaaa; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .img-tarjeta { width: 20%; min-width: 120px; background-size: cover; background-position: center; }

        /* --- CONTENEDOR DE ARTÍCULO ABIERTO --- */
        .articulo-completo { margin-bottom: 40px; }

        /* --- ELEMENTOS INTERNOS DE LOS TUTORIALES --- */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 8px; margin: 30px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.7); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .grid-shortcuts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 35px 0; }
        .grid-shortcuts img { width: 100%; height: auto; border-radius: 6px; border: 1px solid #222; }
        .box-tip { padding: 20px; margin: 30px 0; border-radius: 0 8px 8px 0; }
        .box-tip.blue { background-color: #1e1e1e; border-left: 4px solid #0076ff; }
        .box-tip.pink { background-color: #1e1e1e; border-left: 4px solid #ff0055; }

        /* --- BOTÓN CTA GOOGLE NEWS --- */
        .cta-google-news {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1e1e1e 0%, #151515 100%);
            border: 1px solid #333;
            border-left: 4px solid #4285F4;
            padding: 20px;
            border-radius: 6px;
            margin: 35px 0;
        }
        .cta-texto h5 { color: #ffffff; font-size: 1.1rem; margin-bottom: 4px; }
        .cta-texto p { color: #aaaaaa; font-size: 0.85rem; }
        .btn-cta-news {
            background-color: #ffffff;
            color: #121212;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-cta-news:hover {
            background-color: #4285F4;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(66, 133, 244, 0.4);
        }

        /* --- SECCIÓN RECOMENDADOS (DEBAJO DEL POST) --- */
        .seccion-recomendados { margin-top: 50px; border-top: 2px solid #252525; padding-top: 35px; }
        .seccion-recomendados h4 { font-size: 1.4rem; color: #ffffff; margin-bottom: 25px; border-left: 4px solid #ff0055; padding-left: 12px; }

        /* --- FOOTER CENTRADO --- */
        .footer-legal { width: 100%; background-color: #070707; border-top: 1px solid #1a1a1a; padding: 40px 20px; text-align: center; margin-top: 60px; }
        .links-legales { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .links-legales a { color: #888888; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: color 0.3s ease; }
        .links-legales a:hover { color: #ff0055; }
        .footer-legal p { color: #555555; font-size: 0.8rem; margin: 0; }

        /* --- ADAPTABILIDAD SMARTPHONES --- */
        @media (max-width: 768px) {
            .cabecera-novedades { padding: 15px 20px; }
            .tarjeta-tutorial { flex-direction: column-reverse; }
            .img-tarjeta { width: 100%; height: 120px; }
            .links-legales { gap: 15px; }
            .cta-google-news { flex-direction: column; text-align: center; gap: 15px; }
        }

        /* --- ESTILOS PARA ERRORES Y CARGA --- */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            color: #888888;
        }
        .loading-spinner::after {
            content: "⏳";
            display: block;
            font-size: 3rem;
            margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .error-container {
            padding: 40px;
            text-align: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .error-container h2 {
            color: #ff0055;
            margin-bottom: 15px;
        }
        .error-container p {
            color: #aaaaaa;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .error-container code {
            color: #ff0055;
            background: #222;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .error-container .debug-info {
            color: #cccccc;
            font-size: 0.9em;
            text-align: left;
            max-width: 500px;
            margin: 10px auto;
            background: #222;
            padding: 15px;
            border-radius: 6px;
        }
        .debug-info ul {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }
        .debug-info li {
            padding: 4px 0;
            color: #888;
            font-family: monospace;
        }
        .btn-retry {
            margin-top: 20px;
            padding: 10px 30px;
            background: #ff0055;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-retry:hover {
            background: #cc0044;
        }

        /* Estilos para contenido cargado */
        .articulo-cargado img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }
        .articulo-cargado h1 {

            margin-bottom: 15px;

        .articulo-cargado h2 {

            margin-bottom: 15px;
        }
        .articulo-cargado p {
            color: #cccccc;
            margin-bottom: 15px;
            line-height: 1.8;
        }
        .articulo-cargado ul, .articulo-cargado ol {
            color: #cccccc;
            margin-left: 20px;
            margin-bottom: 15px;
        }
        .articulo-cargado li {
            margin-bottom: 8px;
        }

<body>

    <!-- CONTENEDOR DINÁMICO DEL BLOG -->
    <main class="contenedor-blog">
        
        <!-- NÚCLEO LECTOR (Muestra el tutorial activo) -->
        <section id="vista-lector-articulo" class="articulo-completo">
            <div id="contenido-del-tutorial">
                <div class="loading-spinner">Cargando tutorial...</div>
            </div>
            
            <!-- SECCIÓN INFERIOR: OTROS TUTORIALES DISPONIBLES -->

    <!-- SCRIPT DEL MOTOR DINÁMICO DEL BLOG -->
    <script>
        // ============================================================
        // BASE DE DATOS DE TUTORIALES
        // ============================================================
        const tutoriales = [
          
        ];

        // ============================================================
        // FUNCIÓN PARA CARGAR CONTENIDO EXTERNO
        // ============================================================
        async function cargarContenidoExterno(post) {
            const contenedor = document.getElementById("contenido-del-tutorial");
            
            // Mostrar spinner de carga
            contenedor.innerHTML = `<div class="loading-spinner">Cargando tutorial...</div>`;

            // Definir rutas a probar dinámicamente
            const rutas = [
                post.archivoUrl,
                post.archivoUrl.replace('posts/', ''),
                'posts/' + post.id + '.html',
                'post/' + post.id + '.html',
                './' + post.archivoUrl,
                post.id + '.html'
            ];

            // Eliminar duplicados
            const rutasUnicas = [...new Set(rutas)];

            for (const ruta of rutasUnicas) {
                try {
                    console.log(`🔄 Intentando cargar: ${ruta}`);
                    const response = await fetch(ruta);
                    
                    if (response.ok) {
                        const html = await response.text();
                        contenedor.innerHTML = `<div class="articulo-cargado">${html}</div>`;
                        console.log(`✅ Cargado exitosamente desde: ${ruta}`);
                        return true;
                    }
                } catch (error) {
                    console.warn(`❌ Falló ruta: ${ruta}`, error.message);
                }
            }

            // Si todas fallaron, mostrar error
            contenedor.innerHTML = `
                <div class="error-container">
                    <h2>❌ Error al cargar el tutorial</h2>
                    <p>No hemos podido localizar el archivo del tutorial en tu repositorio.</p>
                    <div class="debug-info">
                        <strong>🔍 Verifica en tu GitHub:</strong><br>
                        1. Que creaste una carpeta llamada <code>posts</code>.<br>
                        2. Que dentro de esa carpeta subiste el archivo <code>${post.id}.html</code>.<br>
                        3. Rutas intentadas:
                        <ul>
                            ${rutasUnicas.map(r => `<li>• ${r}</li>`).join('')}
                        </ul>
                    </div>
                    <button class="btn-retry" onclick="location.reload()">🔄 Intentar de nuevo</button>
                </div>
            `;
            return false;
        }

        // ============================================================
        // FUNCIÓN PARA MOSTRAR UN TUTORIAL
        // ============================================================
        function mostrarTutorial(id) {
            const postSeleccionado = tutoriales.find(p => p.id === id);
            if (!postSeleccionado) {
                console.error("❌ Tutorial no encontrado:", id);
                return;
            }

            // Actualizar título de la página
            document.title = postSeleccionado.titulo + " | Record Very Clean";

            const contenedorContenido = document.getElementById("contenido-del-tutorial");

            // Si es externo, cargar con fetch
            if (postSeleccionado.esExterno) {
                cargarContenidoExterno(postSeleccionado);
            } else {
                // Si es interno, mostrar el HTML directamente
                contenedorContenido.innerHTML = `<div class="articulo-cargado">${postSeleccionado.htmlCompleto}</div>`;
            }

            // Renderizar la lista de recomendados (todos menos el activo)
            const restantes = tutoriales.filter(p => p.id !== id);
            const contenedorRestantes = document.getElementById("contenedor-lista-recomendados");
            contenedorRestantes.innerHTML = "";

            if (restantes.length === 0) {
                contenedorRestantes.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #666;">
                        <p>No hay más tutoriales disponibles.</p>
                    </div>
                `;
            } else {
                restantes.forEach(post => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-tutorial';
                    tarjeta.onclick = () => mostrarTutorial(post.id);
                    tarjeta.innerHTML = `
                        <div class="info-tarjeta">
                            <h3>${post.titulo}</h3>
                            <p>${post.resumen}</p>
                        </div>
                        <div class="img-tarjeta" style="background-image: url('${post.imagenCover}'); background-size: cover; background-position: center;"></div>
                    `;
                    contenedorRestantes.appendChild(tarjeta);
                });
            }

            // Scroll suave al inicio
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================================
        // INICIALIZACIÓN AL CARGAR LA PÁGINA
        // ============================================================
        window.onload = function() {
            if (tutoriales.length > 0) {
                // Cargar el último tutorial de la lista por defecto
                const ultimoTutorial = tutoriales[tutoriales.length - 1];
                mostrarTutorial(ultimoTutorial.id);
            } else {
                document.getElementById("contenido-del-tutorial").innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <h2 style="color: #ff0055;">No hay tutoriales disponibles</h2>
                        <p style="color: #888; margin-top: 15px;">Pronto añadiremos nuevo contenido.</p>
                    </div>
                `;
            }
        };

        // Exponer la función globalmente
        window.mostrarTutorial = mostrarTutorial;

        console.log("🚀 Motor de tutoriales cargado correctamente");
        console.log(`📚 Tutoriales disponibles: ${tutoriales.length}`);
        console.log("📋 IDs:", tutoriales.map(t => t.id).join(', '));
    </script>
</body>
