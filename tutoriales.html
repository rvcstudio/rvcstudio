                    <h3 style="font-size: 1.6em; color: #ffffff; margin-top: 40px; border-bottom: 1px solid #333; padding-bottom: 8px;">El Centro de Control: Las Teclas de Función</h3>

                // Función interna recursiva para intentar una ruta tras otra
                function probarFetch(index) {
                    if (index >= rutasAProbar.length) {
                        // Si todas las rutas fallaron, mostramos el error final explicativo
                        contenedorContenido.innerHTML = `
                            <div style="padding: 40px; text-align: center; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;">
                                <h2 style="color: #ff0055; margin-bottom: 15px;">Error al cargar el tutorial</h2>
                                <p style="color: #aaaaaa; max-width: 500px; margin: 0 auto; line-height: 1.6; margin-bottom: 15px;">
                                    No hemos podido localizar el archivo del tutorial en tu repositorio de GitHub.
                                </p>
                                <p style="color: #cccccc; font-size: 0.9em; text-align: left; max-width: 500px; margin: 0 auto; background: #222; padding: 15px; border-radius: 6px;">
                                    <strong>Por favor revisa en tu GitHub:</strong><br>
                                    1. Que creaste una carpeta llamada exactamente <code style="color:#ff0055;">posts</code> (o <code style="color:#ff0055;">post</code>) en tu repositorio principal.<br>
                                    2. Que dentro de esa carpeta subiste el archivo llamado exactamente <code style="color:#ff0055;">tutorial-4.html</code> (todo en minúsculas).
                                </p>
                            </div>
                        `;
                        return;
                    }

                    const rutaActual = rutasAProbar[index];
                    
                    fetch(rutaActual)
                        .then(response => {
                            if (!response.ok) throw new Error("No encontrado");
                            return response.text();
                        })
                        .then(data => {
                            // Si lo carga correctamente, inyectamos el HTML y paramos la búsqueda
                            contenedorContenido.innerHTML = data;
                        })
                        .catch(() => {
                            // Si falla esta ruta, intentamos automáticamente la siguiente en la lista
                            probarFetch(index + 1);
                        });
                }

                // Iniciamos la prueba secuencial en la ruta index 0
                probarFetch(0);

            } else {
                // Si es un post interno clásico, lo renderiza directo
                contenedorContenido.innerHTML = postSeleccionado.htmlCompleto;
            }

            // Renderizar la sección de recomendados (todos menos el activo)
            const restantes = tutoriales.filter(p => p.id !== id);
            const contenedorRestantes = document.getElementById("contenedor-lista-recomendados");
            contenedorRestantes.innerHTML = "";

            restantes.forEach(post => {
                contenedorRestantes.innerHTML += `
                    <div class="tarjeta-tutorial" onclick="mostrarTutorial('${post.id}')">
                        <div class="info-tarjeta">
                            <h3>${post.titulo}</h3>
                            <p>${post.resumen}</p>
                        </div>
                        <div class="img-tarjeta" style="background-image: url('${post.imagenCover}');"></div>
                    </div>
                `;
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // LÓGICA AUTOMÁTICA EN LA CARGA de la PÁGINA
        window.onload = function() {
            if (tutoriales.length > 0) {
                // Busca automáticamente el último elemento del array 'tutoriales' para cargarlo de primero
                const ultimoTutorial = tutoriales[tutoriales.length - 1];
                mostrarTutorial(ultimoTutorial.id);
            }
        };
    </script>
</body>
</html>
